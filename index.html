<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice AI | Portfolio Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎙️ AI Voice Assistant</h1>
    <p>Hold the mic button & speak – Male voice, English/Hindi/العربية</p>
    <div class="chat-area" id="chatArea">
      <div class="message assistant">Hello! Press and hold the microphone to talk.</div>
    </div>
    <button id="micButton" class="mic-btn"> Hold to talk</button>
    <div class="status" id="status"> Ready</div>
    <details>
      <summary>⚙️ Choose language</summary>
      <select id="languageSelect">
        <option value="en-US">English (US)</option>
        <option value="hi-IN">हिन्दी (Hindi)</option>
        <option value="ar-AE">العربية (Gulf Arabic)</option>
      </select>
    </details>
  </div>
  <script src="script.js"></script>
</body>
</html>
